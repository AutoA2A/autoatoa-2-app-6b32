<div class="container">
    <div class="header">
        <h1>按朝代筛选</h1>
    </div>
    <div id="dynasty-container"></div>
</div>

<script>
    // 确保数据已注入
    if (!window.APP_DATA || !Array.isArray(window.APP_DATA)) {
        console.error('APP_DATA 未正确注入');
        document.body.innerHTML = '<p style="text-align:center;margin-top:40px;color:red;">数据加载失败，请稍后重试。</p>';
    } else {
        // 按朝代分组
        const groups = {};
        window.APP_DATA.forEach(poem => {
            const dyn = poem.dynasty || '未知';
            if (!groups[dyn]) groups[dyn] = [];
            groups[dyn].push(poem);
        });

        const container = document.getElementById('dynasty-container');
        // 按朝代名称排序（可选）
        const sortedDynasties = Object.keys(groups).sort();

        sortedDynasties.forEach(dyn => {
            const section = document.createElement('div');
            section.className = 'dynasty-section';

            const title = document.createElement('h2');
            title.className = 'dynasty-title';
            title.textContent = dyn;
            section.appendChild(title);

            const list = document.createElement('div');
            list.className = 'poem-list';

            groups[dyn].forEach(poem => {
                const card = document.createElement('div');
                card.className = 'poem-card';
                card.title = '点击查看详情';
                card.onclick = () => {
                    location.href = `detail.html?id=${poem.id}`;
                };

                const titleEl = document.createElement('div');
                titleEl.className = 'poem-title';
                titleEl.textContent = poem.title;
                card.appendChild(titleEl);

                const authorEl = document.createElement('div');
                authorEl.className = 'poem-author';
                authorEl.textContent = `作者：${poem.author}`;
                card.appendChild(authorEl);

                list.appendChild(card);
            });

            section.appendChild(list);
            container.appendChild(section);
        });
    }
</script>
</body>
</html>

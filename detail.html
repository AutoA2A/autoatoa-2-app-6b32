    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const id = new URLSearchParams(window.location.search).get('id');
            const poem = window.getById(id);

            if (poem) {
                const poemDetail = document.getElementById('poem-detail');
                poemDetail.innerHTML = `
                    <div class="poem-title">${poem.title}</div>
                    <div class="poem-meta">${poem.dynasty} · ${poem.author}</div>
                    <div class="poem-content">${poem.content}</div>
                    ${poem.annotation ? `
                        <div class="poem-section">
                            <div class="section-title">注释</div>
                            <div>${poem.annotation}</div>
                        </div>
                    ` : ''}
                    ${poem.analysis ? `
                        <div class="poem-section">
                            <div class="section-title">赏析</div>
                            <div>${poem.analysis}</div>
                        </div>
                    ` : ''}
                    ${poem.background ? `
                        <div class="poem-section">
                            <div class="section-title">背景介绍</div>
                            <div>${poem.background}</div>
                        </div>
                    ` : ''}
                    ${poem.image ? `
                        <img src="${poem.image}" alt="${poem.title}" class="poem-image">
                    ` : ''}
                    <div class="related-links">
                        ${poem.annotation ? `<a href="note.html?id=${poem.id}" class="related-link">查看注释详情</a>` : ''}
                        ${poem.analysis ? `<a href="analysis.html?id=${poem.id}" class="related-link">查看赏析详情</a>` : ''}
                    </div>
                `;
            } else {
                document.getElementById('poem-detail').innerHTML = '<p>未找到该诗词。</p>';
            }
        });

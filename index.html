    <div class="container">
        <div class="header">
            <h1>古诗词赏析平台</h1>
        </div>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="搜索诗词...">
            <button onclick="searchPoems()">搜索</button>
        </div>
        <div class="filter">
            <a href="dynasty.html">按朝代筛选</a>
            <a href="author.html">按作者筛选</a>
            <a href="theme.html">按主题筛选</a>
        </div>
        <div class="poem-list" id="poem-list">
            <!-- 诗词列表将在这里渲染 -->
        </div>
    </div>

    <script>
        function renderPoemList(poems) {
            const poemList = document.getElementById('poem-list');
            poemList.innerHTML = '';
            poems.slice(0, 6).forEach(poem => {
                const card = document.createElement('div');
                card.className = 'poem-card';
                card.onclick = () => {
                    window.location.href = `detail.html?id=${poem.id}`;
                };
                card.innerHTML = `
                    <div class="poem-title">${poem.title}</div>
                    <div class="poem-author">${poem.author} (${poem.dynasty})</div>
                `;
                poemList.appendChild(card);
            });
        }

        function searchPoems() {
            const searchInput = document.getElementById('search-input').value.trim();
            if (searchInput) {
                window.location.href = `search.html?query=${encodeURIComponent(searchInput)}`;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (window.APP_DATA) {
                renderPoemList(window.APP_DATA);
            }
        });
    </script>
</body>

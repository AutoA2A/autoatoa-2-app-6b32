    <div class="container">
        <div class="header">
            <h1>搜索结果</h1>
        </div>
        <div class="poem-list" id="poemList"></div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const poemList = document.getElementById('poemList');
            const searchParams = new URLSearchParams(window.location.search);
            const query = searchParams.get('q');

            if (query && window.APP_DATA) {
                const filteredPoems = window.APP_DATA.filter(poem =>
                    poem.title.includes(query) ||
                    poem.author.includes(query) ||
                    poem.dynasty.includes(query) ||
                    poem.content.includes(query)
                );

                if (filteredPoems.length > 0) {
                    filteredPoems.forEach(poem => {
                        const poemCard = document.createElement('div');
                        poemCard.className = 'poem-card';
                        poemCard.innerHTML = `
                            <div class="poem-title">${poem.title}</div>
                            <div class="poem-author">${poem.author} · ${poem.dynasty}</div>
                            <div class="poem-content">${poem.content}</div>
                        `;
                        poemCard.addEventListener('click', function() {
                            window.location.href = `detail.html?id=${poem.id}`;
                        });
                        poemList.appendChild(poemCard);
                    });
                } else {
                    poemList.innerHTML = '<p>没有找到匹配的诗词。</p>';
                }
            } else {
                poemList.innerHTML = '<p>请输入搜索关键词。</p>';
            }
        });
    </script>

        <a href="index.html">首页</a>
        <a href="dynasty.html">按朝代筛选</a>
        <a href="author.html">按作者筛选</a>
        <a href="theme.html">按主题筛选</a>
    </div>
    <div class="container">
        <div class="header">
            <h1>按作者筛选</h1>
        </div>
        <div class="author-list" id="authorList"></div>
    </div>
    <script>
        // 按作者分组数据
        const authors = {};
        window.APP_DATA.forEach(poem => {
            if (!authors[poem.author]) {
                authors[poem.author] = {
                    name: poem.author,
                    dynasty: poem.dynasty,
                    poems: []
                };
            }
            authors[poem.author].poems.push(poem);
        });

        // 渲染作者列表
        const authorList = document.getElementById('authorList');
        Object.keys(authors).forEach(authorName => {
            const author = authors[authorName];
            const authorCard = document.createElement('div');
            authorCard.className = 'author-card';
            authorCard.innerHTML = `
                <div class="author-name">${author.name}</div>
                <div class="author-dynasty">${author.dynasty}</div>
                <div class="poem-list">
                    ${author.poems.map(poem => `
                        <div class="poem-item">
                            <a href="detail.html?id=${poem.id}" class="poem-title">${poem.title}</a>
                        </div>
                    `).join('')}
                </div>
            `;
            authorList.appendChild(authorCard);
        });
    </script>
</body>
